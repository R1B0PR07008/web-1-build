<body id="_0" onload="phoneMode('p'); lightDarkMode()">
    <div class="navbar">
      <span id="nav"></span>
      <a href="/Home.html" class="navbar-brand, center" id="nav-text">Home</a>

  <h1>PA Program
</h1>
  <p>Pressure Formula program</p>
  <form action="" method="post">
    <input
      type="number"
      placeholder="F1"
      name="f1"
      class="pa-f1-a1-MARGIN"
      id="PA-F1"
    />
    <p class="Equal">=</p>
    <input
      type="number"
      placeholder="F2"
      name="f2"
      id="PA-F2"
    />
    <br />
    <input
      type="number"
      placeholder="A1"
      name="a1"
      id="PA-A1"
      class="pa-f1-a1-MARGIN"
    />
    <p class="Equal">=</p>
    <input
      type="number"
      placeholder="A2"
      name="a2"
      id="PA-A2"
    />
    <button onclick="PA()" class="btn-default" type="button" id="BTN-1-PA">Enter</button>  
  </form>

  <div class="Ans-block , vertical-align" id="react-12">
    <h2 class="ans-text">
      The answer: 
    </h2>
    <p id="ans-footer">
    To get your answer enter a number in the left slot and the value.
    </p>
    <div id="ans">
      <p class="ans-text">F1: <span id="pa-f1"></span></p>
      <p class="ans-text">F2: <span id="pa-f2"></span></p>
      <p class="ans-text">A1: <span id="pa-a1"></span></p>
      <p class="ans-text">A2: <span id="pa-a2"></span></p>
    </div>
  </div>

  <div class="Legend-block , vertical-align" id="react-13">
    <h2 class="Legend-text"> The Legend: </h2>
    <p class="Legend-text"> F1 = Force 1 </p>
    <p class="Legend-text"> A1 = Area 1 </p>
    <p class="Legend-text"> F2 = Force 2 </p>
    <p class="Legend-text"> A2 = Area 2 </p>
