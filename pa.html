<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    rel="stylesheet"
    type="text/css"
    href="/site.css"
  />
  <title>!</title>
</head>
<body>
  <div class="navbar">
    <a href="/Home.html" class="navbar-brand">Home</a>
    <a href="/register.html" class="navbar-brand-right-base" id="singup-nav">Sing Up!</a>
    <a href="/login.html" class="navbar-brand-right-base">Log In</a>
    <div class="dropdown">
      <button class="dropbtn" type="button">Program</button>
      <div class="dropdown-content">
        <a href="/trithingys.html">Triangle Formulas</a>
        <a href="/Conversions.html">Conversions</a>
        <a href="/program.html">Science/Math Formulas</a>
      </div>
    </div>
    <a href="/Membership.html" class="navbar-brand">Membership</a>
  </div>  
  <h1>PA Program
</h1>
  <p>Pressure Formula program</p>
  <form action="" method="post">
    <input
      type="float"
      placeholder="F1"
      name="f1"
      class="pa-f1-a1-MARGIN"
      id="PA-F1"
    />
    <p class="Equal">=</p>
    <input
      type="float"
      placeholder="F2"
      name="f2"
      id="PA-F2"
    />
    <br />
    <input
      type="float"
      placeholder="A1"
      name="a1"
      id="PA-A1"
      class="pa-f1-a1-MARGIN"
    />
    <p class="Equal">=</p>
    <input
      type="float"
      placeholder="A2"
      name="a2"
      id="PA-A2"
    />
    <button onclick="PA()" class="btn-default" type="button" id="BTN-1-PA">Enter</button>  
  </form>

  <div class="Ans-block">
    <h2 class="ans-text">
      The answer: 
    </h2>
    <p id="ans-footer">
    To get your answer enter a number in the left slot and the value.
    </p>
    <div id="ans">
      <p class="ans-text">F1: <span id="pa-f1"></span></p>
      <p class="ans-text">F2: <span id="pa-f2"></span></p>
      <p class="ans-text">A1: <span id="pa-a1"></span></p>
      <p class="ans-text">A2: <span id="pa-a2"></span></p>
    </div>
  </div>

  <div class="Legend-block">
    <h2 class="Legend-text"> The Legend: </h2>
    <p class="Legend-text"> F1 = Force 1 </p>
    <p class="Legend-text"> A1 = Area 1 </p>
    <p class="Legend-text"> F2 = Force 2 </p>
    <p class="Legend-text"> A2 = Area 2 </p>
  </div>

</body>
<script src="/site.js"></script>
</html>
