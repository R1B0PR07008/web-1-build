<body>
    <div class="navbar">

<h1>Time Program
</h1>
<form action="" method="post">
  <input
    type="number"
    placeholder="Number"
    name="mass"
    id="NUM-TIME"
  />
  <select aria-label="unit selector" name="UNIT-TIME" id="UNIT-TIME">
    <option value="H">Hours</option>
    <option value="S">Seconds</option>
    <option value="M">Minutes</option>
  </select>
  <br>
  <button onclick="Time()" class="btn-default" type="button" id="BTN-1-MASS">Enter</button>
</form>

<div class="Ans-block vertical-align">
  <h2 class="ans-text">
    The answer: 
  </h2>

  <div id="ans">
    <p class="ans-text" > <span id="time-1-text"></span> <span id="01-time"></span></p>
    <p class="ans-text" > <span id="time-2-text"></span> <span id="02-time"></span></p>

    <p id="1-LEN-IF">
  To get your answer enter a number in the left slot and the value.
  </p>
    <h2 id="ans-text">Formulas</h2>
    <p class="ans-text"> <span id="time-3-text"></span> <span class="ans-text-NUM"></span> <span id="time-1-formula"></span></p>
    <p class="ans-text"> <span id="time-4-text"></span> <span class="ans-text-NUM"></span> <span id="time-2-formula"></span></p>
    <p id="2-LEN-IF">To get the formulas please enter a number and select a unit. </p>
    </div>
</div>

<div class="Legend-block vertical-align">
  <h2 class="Legend-text"> The Legend: </h2>
  <p class="Legend-text"> S = Second/Segundo </p>
  <p class="Legend-text"> M = Minute/Minuto </p>
  <p class="Legend-text"> H = Hours/Horas </p>
</div>
